
# SERVER
server.port=8082
spring.application.name=conference-service

# DATABASE - MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/conference_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=false

# KAFKA
spring.kafka.bootstrap-servers=localhost:9092

# DOCKER COMPOSE (Disable auto-start)
spring.docker.compose.enabled=false

# ACTUATOR (Monitoring)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always